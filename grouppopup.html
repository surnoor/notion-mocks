<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move to Group - SkyViewLinks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121214;
            --surface-color: #1c1c1f;
            --border-color: #2d2d30;
            --text-primary: #ffffff;
            --text-secondary: #94949e;
            --accent-primary: #6347d1;
            --accent-hover: #7b61ff;
            --surface-hover: #252529;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f0f12;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: var(--surface-color);
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 32px 32px 24px;
            display: flex;
            gap: 16px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
            background: var(--surface-hover);
        }

        .icon-container {
            width: 48px;
            height: 48px;
            background: rgba(99, 71, 209, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-container svg {
            color: var(--accent-primary);
            width: 24px;
            height: 24px;
        }

        .header-text h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-text p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .modal-body {
            padding: 0 32px 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .url-box {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            cursor: default;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Folder Browser Section */
        .folder-selector {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-color);
            overflow: hidden;
        }

        .folder-path {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
        }

        .path-crumb {
            cursor: pointer;
            transition: color 0.2s;
        }

        .path-crumb:hover {
            color: var(--text-primary);
        }

        .folder-list {
            max-height: 200px;
            min-height: 120px;
            overflow-y: auto;
            padding: 4px;
        }

        .folder-item {
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .folder-item:hover {
            background: var(--surface-hover);
        }

        .folder-item.selected {
            background: rgba(99, 71, 209, 0.1);
            border: 1px solid rgba(99, 71, 209, 0.2);
        }

        .folder-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .folder-item svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        .folder-item.selected svg {
            color: var(--accent-primary);
        }

        .folder-item-name {
            font-size: 14px;
            font-weight: 500;
        }

        .folder-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
        }

        .add-folder-btn {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            transition: color 0.2s;
        }

        .add-folder-btn:hover {
            color: var(--accent-hover);
        }

        .new-folder-input-container {
            display: none;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .new-folder-input {
            background: var(--surface-hover);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            flex: 1;
        }

        .modal-footer {
            padding: 0 32px 32px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 8px 16px rgba(99, 71, 209, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Scrollbar Styling */
        .folder-list::-webkit-scrollbar {
            width: 6px;
        }

        .folder-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .folder-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .chevron-right {
           color: var(--text-secondary);
           opacity: 0.5;
        }

    </style>
</head>

<body>
    <div class="modal-overlay">
        <div class="modal">
            <button class="close-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div class="modal-header">
                <div class="icon-container">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        <path d="M12 11v6"></path>
                        <path d="M9 14h6"></path>
                    </svg>
                </div>
                <div class="header-text">
                    <h2>Move to Group</h2>
                    <p>Move the following deeplink to a different group:</p>
                </div>
            </div>

            <div class="modal-body">
                <div class="input-group">
                    <div class="url-box" id="deeplink-url">
                        https://staging.myskyview.link/3333
                    </div>
                </div>

                <div class="input-group">
                    <label class="label">Target group</label>
                    <div class="folder-selector">
                        <div class="folder-path" id="folder-breadcrumbs">
                            <span class="path-crumb" onclick="navigateTo(null)">My Groups</span>
                        </div>
                        
                        <div class="folder-list" id="folder-list">
                            <!-- Folders will be injected here -->
                        </div>

                        <div class="folder-actions">
                            <button class="add-folder-btn" id="show-add-folder" onclick="toggleNewFolderInput(true)">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                New Group
                            </button>
                            
                            <div class="new-folder-input-container" id="new-folder-container">
                                <input type="text" class="new-folder-input" id="new-folder-input" placeholder="Enter group name...">
                                <button class="btn-primary" style="padding: 6px 12px; border-radius: 8px; font-size: 11px;" onclick="createNewFolder()">Add</button>
                                <button class="btn-secondary" style="padding: 6px 12px; border-radius: 8px; font-size: 11px;" onclick="toggleNewFolderInput(false)">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary">Cancel</button>
                <button class="btn btn-primary">Move</button>
            </div>
        </div>
    </div>

    <script>
        // Mock data for folders
        let folders = [
            { id: '1', name: 'Marketing Campaigns', parentId: null },
            { id: '2', name: 'Social Media', parentId: null },
            { id: '3', name: 'Client Portals', parentId: null },
            { id: '4', name: 'Q1 Launch', parentId: '1' },
            { id: '5', name: 'Product Updates', parentId: '1' },
            { id: '6', name: 'Instagram Bio', parentId: '2' },
            { id: '7', name: 'Twitter Threads', parentId: '2' },
        ];

        let currentParentId = null;
        let selectedFolderId = null;

        function renderFolders() {
            const list = document.getElementById('folder-list');
            const breadcrumbs = document.getElementById('folder-breadcrumbs');
            
            // Render Breadcrumbs
            let bcHtml = `<span class="path-crumb" onclick="navigateTo(null)">My Groups</span>`;
            if (currentParentId) {
                const parent = folders.find(f => f.id === currentParentId);
                bcHtml += ` <span class="chevron-right">/</span> <span class="path-crumb">${parent.name}</span>`;
            }
            breadcrumbs.innerHTML = bcHtml;

            // Render List
            const filteredFolders = folders.filter(f => f.parentId === currentParentId);
            
            if (filteredFolders.length === 0) {
                list.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--text-secondary); font-size: 13px;">No sub-groups found.</div>`;
            } else {
                list.innerHTML = filteredFolders.map(folder => `
                    <div class="folder-item ${selectedFolderId === folder.id ? 'selected' : ''}" onclick="selectFolder('${folder.id}')">
                        <div class="folder-item-info">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span class="folder-item-name">${folder.name}</span>
                        </div>
                        <div onclick="event.stopPropagation(); navigateTo('${folder.id}')">
                            <svg class="chevron-right" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </div>
                `).join('');
            }
        }

        function navigateTo(id) {
            currentParentId = id;
            selectedFolderId = null; 
            renderFolders();
            toggleNewFolderInput(false);
        }

        function selectFolder(id) {
            selectedFolderId = id;
            renderFolders();
        }

        function toggleNewFolderInput(show) {
            document.getElementById('show-add-folder').style.display = show ? 'none' : 'flex';
            document.getElementById('new-folder-container').style.display = show ? 'flex' : 'none';
            if (show) document.getElementById('new-folder-input').focus();
        }

        function createNewFolder() {
            const input = document.getElementById('new-folder-input');
            const name = input.value.trim();
            if (name) {
                const newFolder = {
                    id: Date.now().toString(),
                    name: name,
                    parentId: currentParentId
                };
                folders.push(newFolder);
                input.value = '';
                toggleNewFolderInput(false);
                renderFolders();
                selectFolder(newFolder.id);
            }
        }

        // Initial render
        renderFolders();
    </script>
</body>

</html>
