<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Clone - SkyViewLinks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121214;
            --surface-color: #1c1c1f;
            --border-color: #2d2d30;
            --text-primary: #ffffff;
            --text-secondary: #94949e;
            --accent-primary: #6347d1;
            --accent-hover: #7b61ff;
            --surface-hover: #252529;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f0f12;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: var(--surface-color);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: modalAppear 0.3s ease-out;
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal.step-2-active {
            max-width: 1000px;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 32px 32px 24px;
            display: flex;
            gap: 16px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
            background: var(--surface-hover);
        }

        .icon-container {
            width: 48px;
            height: 48px;
            background: rgba(99, 71, 209, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-container svg {
            color: var(--accent-primary);
            width: 24px;
            height: 24px;
        }

        /* Toolkit & Bulk Clone Styles */
        .step-2-content {
            display: none;
            padding: 0 32px 32px;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-column {
            display: flex;
            flex-direction: column;
        }

        .section-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .toolkit {
            background: rgba(255,255,255,0.02);
            border: 1px dashed var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .toolkit-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 14px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-mini {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 13px;
            width: 100%;
            outline: none;
            transition: 0.2s;
        }

        .input-mini:focus { border-color: var(--accent-primary); }

        .style-select {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }

        .btn-gen {
            grid-column: span 2;
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-gen:hover { background: var(--accent-hover); }

        .slugs-container { position: relative; flex: 1; min-height: 240px; }

        .slugs-textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            color: var(--text-primary);
            font-family: 'Inter', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .slugs-textarea:focus { border-color: var(--accent-primary); }

        .slug-count {
            position: absolute;
            bottom: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-primary);
            background: rgba(99, 71, 209, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .field-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 700; }

        .step-hidden { display: none !important; }

        .info-card {
            background: rgba(99, 71, 209, 0.08);
            border: 1px solid rgba(99, 71, 209, 0.15);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        

        .header-text h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-text p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .modal-body {
            padding: 0 32px 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .url-box {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            cursor: default;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Folder Browser Section */
        .folder-selector {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-color);
            overflow: hidden;
        }

        .folder-path {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
        }

        .path-crumb {
            cursor: pointer;
            transition: color 0.2s;
        }

        .path-crumb:hover {
            color: var(--text-primary);
        }

        .folder-list {
            max-height: 200px;
            min-height: 120px;
            overflow-y: auto;
            padding: 4px;
        }

        .folder-item {
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .folder-item:hover {
            background: var(--surface-hover);
        }

        .folder-item.selected {
            background: rgba(99, 71, 209, 0.1);
            border: 1px solid rgba(99, 71, 209, 0.2);
        }

        .folder-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .folder-item svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        .folder-item.selected svg {
            color: var(--accent-primary);
        }

        .folder-item-name {
            font-size: 14px;
            font-weight: 500;
        }

        .folder-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
        }

        .add-folder-btn {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            transition: color 0.2s;
        }

        .add-folder-btn:hover {
            color: var(--accent-hover);
        }

        .new-folder-input-container {
            display: none;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .new-folder-input {
            background: var(--surface-hover);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            flex: 1;
        }

        .modal-footer {
            padding: 0 32px 32px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 8px 16px rgba(99, 71, 209, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Scrollbar Styling */
        .folder-list::-webkit-scrollbar {
            width: 6px;
        }

        .folder-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .folder-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .chevron-right {
           color: var(--text-secondary);
           opacity: 0.5;
        }

    </style>
</head>

<body>
    <div class="modal-overlay">
        <div class="modal">
            <button class="close-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div class="modal-header">
                <div class="icon-container" id="modal-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </div>
                <div class="header-text">
                    <h2 id="modal-title">Bulk Clone</h2>
                    <p id="modal-desc">Start by creating a group for your cloned deeplinks:</p>
                </div>
            </div>

            <div class="modal-body" id="step-1-content">
                <div class="input-group">
                    <div class="url-box" id="deeplink-url">
                        https://staging.myskyview.link/3333
                    </div>
                </div>


                <div class="input-group">
                    <label class="label">Target group</label>
                    <div class="folder-selector">
                        <div class="folder-path" id="folder-breadcrumbs">
                            <span class="path-crumb" onclick="navigateTo(null)">My Groups</span>
                        </div>
                        
                        <div class="folder-list" id="folder-list">
                            <!-- Folders will be injected here -->
                        </div>

                        <div class="folder-actions">
                            <button class="add-folder-btn" id="show-add-folder" onclick="toggleNewFolderInput(true)">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                New Group
                            </button>
                            
                            <div class="new-folder-input-container" id="new-folder-container">
                                <input type="text" class="new-folder-input" id="new-folder-input" placeholder="Enter group name...">
                                <button class="btn-primary" style="padding: 6px 12px; border-radius: 8px; font-size: 11px;" onclick="createNewFolder()">Add</button>
                                <button class="btn-secondary" style="padding: 6px 12px; border-radius: 8px; font-size: 11px;" onclick="toggleNewFolderInput(false)">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Step 2: Bulk Clone Functionality -->
            <div class="step-2-content" id="step-2-content">
                <div class="modal-column">
                    <div class="section-label">Source Deeplink</div>
                    <div class="url-box" style="margin-bottom: 24px; color: var(--accent-primary);">https://staging.myskyview.link/3333</div>

                    <div class="toolkit">
                        <div class="toolkit-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4 4 4-4 4-4-4Z"/><path d="m2 14 4-4 4 4-4 4-4-4Z"/><path d="m7 21 4-4 4 4-4 4-4-4Z"/><path d="m7 7 4-4 4 4-4 4-4-4Z"/></svg>
                            Smart Generator Tool
                        </div>
                        <div class="grid-3">
                            <div>
                                <span class="field-label">BASE SLUG</span>
                                <input type="text" id="gen-prefix" class="input-mini" placeholder="e.g. flash-sale">
                            </div>
                            <div>
                                <span class="field-label">PATTERN</span>
                                <select id="gen-style" class="style-select">
                                    <option value="num">Sequential (01, 02...)</option>
                                    <option value="rand">Random Alpha</option>
                                    <option value="mix">Hybrid Mix</option>
                                </select>
                            </div>
                            <div style="grid-column: span 2;">
                                <span class="field-label">TOTAL COUNT</span>
                                <input type="number" id="gen-count" class="input-mini" value="50" min="1" max="1000">
                            </div>
                            <button class="btn-gen" onclick="generateSlugs()">Auto-Generate & Fill Slugs</button>
                        </div>
                    </div>

                    <div class="info-card">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        <p style="font-size: 11px; opacity: 0.7;">Example: <b>myskyview.link/[slug]</b>. Spaces converted to dashes.</p>
                    </div>
                </div>

                <div class="modal-column">
                    <div class="section-label">
                        Target Slugs
                    </div>
                    <div class="slugs-container">
                        <textarea id="slug-input" class="slugs-textarea" 
                            placeholder="Enter one slug per line..." 
                            oninput="updateCounter()"></textarea>
                        <span id="counter" class="slug-count">0 READY</span>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="prevStep()" id="back-btn" style="display: none;">Back</button>
                <div style="flex: 1;"></div>
                <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="main-action-btn" onclick="nextStep()">Continue</button>
            </div>
        </div>
    </div>

    <script>
        // Mock data for folders
        let folders = [
            { id: '1', name: 'Marketing Campaigns', parentId: null },
            { id: '2', name: 'Social Media', parentId: null },
            { id: '3', name: 'Client Portals', parentId: null },
            { id: '4', name: 'Q1 Launch', parentId: '1' },
            { id: '5', name: 'Product Updates', parentId: '1' },
            { id: '6', name: 'Instagram Bio', parentId: '2' },
            { id: '7', name: 'Twitter Threads', parentId: '2' },
        ];

        let currentParentId = null;
        let selectedFolderId = null;

        let currentStep = 1;

        function renderFolders() {
            const list = document.getElementById('folder-list');
            const breadcrumbs = document.getElementById('folder-breadcrumbs');
            
            // Render Breadcrumbs
            let bcHtml = `<span class="path-crumb" onclick="navigateTo(null)">My Groups</span>`;
            if (currentParentId) {
                const parent = folders.find(f => f.id === currentParentId);
                bcHtml += ` <span class="chevron-right">/</span> <span class="path-crumb">${parent.name}</span>`;
            }
            if (breadcrumbs) breadcrumbs.innerHTML = bcHtml;

            // Render List
            const filteredFolders = folders.filter(f => f.parentId === currentParentId);
            
            if (!list) return;

            if (filteredFolders.length === 0) {
                list.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--text-secondary); font-size: 13px;">No sub-groups found.</div>`;
            } else {
                list.innerHTML = filteredFolders.map(folder => `
                    <div class="folder-item ${selectedFolderId === folder.id ? 'selected' : ''}" onclick="selectFolder('${folder.id}')">
                        <div class="folder-item-info">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span class="folder-item-name">${folder.name}</span>
                        </div>
                        <div onclick="event.stopPropagation(); navigateTo('${folder.id}')">
                            <svg class="chevron-right" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </div>
                `).join('');
            }
        }

        function nextStep() {
            if (currentStep === 1) {
                currentStep = 2;
                document.getElementById('step-1-content').classList.add('step-hidden');
                document.getElementById('step-2-content').style.display = 'grid';
                document.querySelector('.modal').classList.add('step-2-active');
                document.getElementById('modal-title').innerText = 'Bulk Clone Slugs';
                document.getElementById('modal-desc').innerText = 'Generate or enter unique slugs for your clones.';
                document.getElementById('main-action-btn').innerText = 'Clone 0 Links';
                document.getElementById('back-btn').style.display = 'block';
                document.getElementById('cancel-btn').style.display = 'none';
                updateCounter();
            } else {
                // Handle final cloning action
                alert('Cloning initiated!');
            }
        }

        function prevStep() {
            if (currentStep === 2) {
                currentStep = 1;
                document.getElementById('step-1-content').classList.remove('step-hidden');
                document.getElementById('step-2-content').style.display = 'none';
                document.querySelector('.modal').classList.remove('step-2-active');
                document.getElementById('modal-title').innerText = 'Bulk Clone';
                document.getElementById('modal-desc').innerText = 'Start by creating a group for your cloned deeplinks:';
                document.getElementById('main-action-btn').innerText = 'Continue';
                document.getElementById('back-btn').style.display = 'none';
                document.getElementById('cancel-btn').style.display = 'block';
            }
        }

        function updateCounter() {
            const textarea = document.getElementById('slug-input');
            if (!textarea) return;
            const text = textarea.value;
            const slugs = text.split('\n').filter(s => s.trim().length > 0);
            const count = slugs.length;
            document.getElementById('counter').innerText = `${count} READY`;
            document.getElementById('main-action-btn').innerText = `Clone ${count} Links`;
        }

        function generateSlugs() {
            const prefix = document.getElementById('gen-prefix').value.trim() || 'link';
            const count = parseInt(document.getElementById('gen-count').value) || 10;
            const style = document.getElementById('gen-style').value;
            const textarea = document.getElementById('slug-input');
            
            let generated = [];
            
            for (let i = 1; i <= count; i++) {
                let slug = '';
                if (style === 'num') {
                    slug = `${prefix}-${i.toString().padStart(2, '0')}`;
                } else if (style === 'rand') {
                    slug = `${prefix}-${Math.random().toString(36).substring(2, 6)}`;
                } else {
                    slug = `${prefix}-${i}-${Math.random().toString(36).substring(2, 4)}`;
                }
                generated.push(slug);
            }
            
            textarea.value = generated.join('\n');
            updateCounter();
        }

        function navigateTo(id) {
            currentParentId = id;
            selectedFolderId = null; 
            renderFolders();
            const toggleFn = typeof toggleNewFolderInput === 'function' ? toggleNewFolderInput : null;
            if (toggleFn) toggleFn(false);
        }


        function selectFolder(id) {
            selectedFolderId = id;
            renderFolders();
        }

        function toggleNewFolderInput(show) {
            document.getElementById('show-add-folder').style.display = show ? 'none' : 'flex';
            document.getElementById('new-folder-container').style.display = show ? 'flex' : 'none';
            if (show) document.getElementById('new-folder-input').focus();
        }

        function createNewFolder() {
            const input = document.getElementById('new-folder-input');
            const name = input.value.trim();
            if (name) {
                const newFolder = {
                    id: Date.now().toString(),
                    name: name,
                    parentId: currentParentId
                };
                folders.push(newFolder);
                input.value = '';
                toggleNewFolderInput(false);
                renderFolders();
                selectFolder(newFolder.id);
            }
        }

        // Initial render
        renderFolders();
    </script>
</body>

</html>
